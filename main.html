<!DOCTYPE html>
<html lang='en'>
<head>
    <meta charset='utf-8'>
    <meta name='viewport' content='width=device-width, initial-scale=1'>
    <title>Projeto Crud alunos</title>
    <link rel='stylesheet' href='style.css'>
</head>
<body>
    <header>
        <h1>Painel de novos alunos</h1>
    </header>
    <main>
        <section id="novo-aluno">
        <a href="newstudent.html" class="estilo-btn">Novo aluno</a>
        </section>
        <section id="alunos">
            <h2>Alunos ativos</h2>
            <article>
                <div class="identidade">
                    <div class="dados-alunos">
                        <strong class="nome">nome: José Flávio Xavier</strong>
                        <span class="matricula">
                            matricula: <span class="id-matricula">2022612325</span>
                        </span>
                        <span class="serie">
                            serie: <span class="id-turma">7B</span>
                        </span>
                    </div>
                    <div>
                        <button type="button" class="estilo-btn">Acessar</button>
                    </div>
                </div>
            </article>
        </section>
    </main>
    
    <script src="script.js"></script>
</body>
</html>
